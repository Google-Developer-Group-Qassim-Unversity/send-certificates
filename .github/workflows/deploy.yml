name: Deploy Certificate API

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy using ssh
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.INFISICAL_VPS_HOST }}
        username: ${{ secrets.INFISICAL_VPS_USER }}
        key: ${{ secrets.INFISICAL_GITHUB_SSH_PRIVATE_KEY }}
        port: 22
        script: |
          set -e
          export PATH="$HOME/.local/bin:$PATH"

          echo "Running Deployment commands...🚀"
          NAME="certificate-api"
          TARGET_DIR=~/$NAME
          BRANCH=main
          REPO_URL="https://github.com/Google-Developer-Group-Qassim-Unversity/send-certificates.git"
          PORT=8000
          PM2_PATH="/home/ubuntu/.nvm/versions/node/v24.12.0/bin/"
          export PATH="$PM2_PATH:$PATH"

          INFISICAL_ENV="prod"
          INFISICAL_ENV_PATH="/emails-backend"
          INFISICAL_PROJECT_ID="300b1e97-7e52-4a4e-872d-053b9082cac5"

          echo "Cloning new repository..."
          rm -rf "$TARGET_DIR"
          git clone --branch $BRANCH "$REPO_URL" "$TARGET_DIR"
          echo "Deployment Complete ✅."
          echo "==============================="

          echo "📄 Checking rsvg-convert..."
          if ! command -v rsvg-convert >/dev/null 2>&1; then
              echo "Installing librsvg2-bin..."
              sudo apt-get update -qq
              sudo apt-get install -y librsvg2-bin
              echo "rsvg-convert installed ✅."
          else
              echo "rsvg-convert already installed ✅."
          fi
          echo "==============================="

          echo "Running Build commands...🚀"
          cd "$TARGET_DIR"

          if ! command -v infisical >/dev/null 2>&1; then
              echo "🔑 Installing Infisical CLI..."
              curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
              sudo apt-get update -qq
              sudo apt-get install -y infisical
          else
              echo "🔑 Found Infisical at $(command -v infisical)"
          fi

          echo "🥷 logging in to Infisical..."
          source /etc/infisical/prod.env
          INFISICAL_TOKEN="$(
            infisical login \
              --method=$INFISICAL_AUTH_METHOD \
              --client-id="$INFISICAL_UNIVERSAL_AUTH_CLIENT_ID" \
              --client-secret="$INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET" \
              --plain --silent
          )"
          export INFISICAL_TOKEN

          if ! command -v uv >/dev/null 2>&1; then
              echo "☀️ Installing uv..."
              curl -LsSf https://astral.sh/uv/install.sh | sh
              source ~/.bashrc
          else
              echo "☀️ Found uv at $(command -v uv)"
          fi

          echo "📦 Setting up virtual environment and installing dependencies..."
          uv venv --clear -p python3.13 .venv
          source .venv/bin/activate
          uv sync

          echo "Build Complete ✅."
          echo "==============================="

          echo "🚀 Starting application with pm2..."
          if ! command -v pm2 >/dev/null 2>&1; then
              echo "❗ PM2 not Found"
              echo "install it with:  npm install pm2 -g"
              exit 1
          fi

          echo "💾 Creating process $NAME..."
          pm2 delete $NAME || true
          pm2 start "INFISICAL_TOKEN=$INFISICAL_TOKEN infisical run --env=$INFISICAL_ENV --path='$INFISICAL_ENV_PATH' --projectId=$INFISICAL_PROJECT_ID -- uv run uvicorn app.main:app --port $PORT --host 0.0.0.0" --name $NAME --time
          pm2 save
          echo "Application is running on port $PORT ✅."
          echo "==============================="
